<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio Digital Vertigo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #050608;
            --surface: #0d1117;
            --surface2: #111520;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #e5e7eb;
            --muted: #6b7280;
            --accent: #3b82f6;
            --accent-dim: rgba(59,130,246,0.15);
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ───────────────────────────────────────── */
        header {
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .logo { display: flex; align-items: baseline; gap: 0.6rem; text-decoration: none; }
        .logo h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; color: #f9fafb; }
        .logo span { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.01em; }

        .controls-wrap { display: flex; align-items: center; gap: 1rem; flex: 1; max-width: 600px; }
        .search-wrap { flex: 2; position: relative; }
        .search-wrap input {
            width: 100%; padding: 0.45rem 0.85rem 0.45rem 2.2rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.82rem;
            outline: none; transition: border-color 0.15s;
        }
        .search-wrap input:focus { border-color: rgba(59,130,246,0.45); }
        .search-wrap svg {
            position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%);
            width: 14px; height: 14px; stroke: var(--muted); fill: none; pointer-events: none;
        }

        /* Estilo para el Selector de Orden */
        .sort-select {
            flex: 1; background: var(--surface); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 0.45rem; font-size: 0.82rem; outline: none; cursor: pointer;
        }

        /* ── Category tabs ─────────────────────────────────── */
        .filters { padding: 0.75rem 2rem 0; display: flex; gap: 0.35rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
        .filter-btn {
            display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.32rem 0.8rem; margin-bottom: 0.75rem;
            font-size: 0.78rem; font-weight: 500; background: transparent; color: var(--muted);
            border: 1px solid transparent; border-radius: 20px; cursor: pointer; transition: all 0.12s;
        }
        .filter-btn:hover { color: var(--text); border-color: var(--border2); }
        .filter-btn.active { background: var(--accent-dim); color: #93c5fd; border-color: rgba(59,130,246,0.3); }
        .tab-count { font-size: 0.65rem; font-weight: 600; background: rgba(255,255,255,0.07); color: var(--muted); padding: 0.1rem 0.42rem; border-radius: 20px; }

        /* ── Main grid ─────────────────────────────────────── */
        main { flex: 1; padding: 1.75rem 2rem; max-width: 1280px; width: 100%; margin: 0 auto; }
        .grid-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
        .grid-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.15rem; }

        /* CSS para los títulos de colecciones */
        .collection-separator {
            grid-column: 1 / -1;
            margin: 1.5rem 0 0.5rem 0;
            padding-top: 1rem;
        }
        .collection-separator h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .collection-separator hr { border: none; border-top: 1px solid var(--border); }

        /* ── Card ──────────────────────────────────────────── */
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; cursor: pointer; transition: all 0.15s;
        }
        .card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; background: #080c14; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; color: #1e2535; }
        .thumb-placeholder svg { width: 40px; height: 40px; stroke: currentColor; fill: none; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.45rem; flex: 1; }
        .card-title { font-size: 0.88rem; font-weight: 600; color: #f1f3f5; }
        .badge { font-size: 0.6rem; font-weight: 600; padding: 0.16rem 0.5rem; border-radius: 20px; text-transform: uppercase; }
        .badge-default { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
        
        .card-desc {
            font-size: 0.77rem;
            color: var(--muted);
            line-height: 1.55;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
        }
        .card-footer { padding: 0.65rem 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .btn-view { font-size: 0.73rem; font-weight: 500; padding: 0.3rem 0.8rem; background: var(--accent-dim); color: #93c5fd; border: 1px solid rgba(59,130,246,0.28); border-radius: 6px; cursor: pointer; }

        footer { padding: 2rem; border-top: 1px solid var(--border); font-size: 0.7rem; color: #2a3040; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <h1>Repositorio Digital Vertigo</h1>
        <span>Galería de contenidos</span>
    </a>
    <div class="controls-wrap">
        <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search" placeholder="Buscar..." autocomplete="off">
        </div>
        <select id="sort-order" class="sort-select">
            <option value="coleccion">Por colecciones</option>
            <option value="default">Por defecto</option>
            <option value="az">Nombre (A-Z)</option>
            <option value="za">Nombre (Z-A)</option>
            <option value="tipo">Por tipo</option>
            
        </select>
    </div>
</header>

<div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">Todo <span class="tab-count" id="count-all">0</span></button>
</div>

<main>
    <div class="grid-header">
        <span class="grid-label" id="grid-label">Cargando ...</span>
    </div>
    <div class="grid" id="grid"></div>
</main>

<footer>ArchVista — Archivo-1</footer>

<script>
    let MODELS = [];
    const CATEGORIAS = ['modelo-3d', 'pdf', 'video', 'galeria', 'enlace', 'audio'];
    let activeFilter = 'all';
    let searchQuery = '';
    let currentSort = 'coleccion';

    const nombresCategoria = {
        'modelo-3d': 'Modelo 3D',
        'pdf': 'PDF',
        'video': 'Video',
        'galeria': 'Galería',
        'enlace': 'Enlace',
        'audio': 'Audio'
    };

    fetch('content.json')
        .then(response => {
            if (!response.ok) throw new Error('Failed to load models');
            return response.json();
        })
        .then(data => {
            MODELS = data;
            buildCategoryButtons();
            updateCounts();
            renderGrid();
        })
        .catch(error => {
            console.error('Error loading models:', error);
            document.getElementById('grid-label').textContent = 'Error loading models';
        });

    function buildCategoryButtons() {
        const categoriasPresentes = new Set(MODELS.map(m => m.categoria));
        const filtersDiv = document.getElementById('filters');
        
        CATEGORIAS.forEach(cat => {
            if (categoriasPresentes.has(cat)) {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.cat = cat;
                btn.innerHTML = `${nombresCategoria[cat] || cat} <span class="tab-count" id="count-${cat}">0</span>`;
                filtersDiv.appendChild(btn);
            }
        });
    }

    function updateCounts() {
        const allEl = document.getElementById('count-all');
        if (allEl) allEl.textContent = MODELS.length;
        
        CATEGORIAS.forEach(cat => {
            const n = MODELS.filter(m => m.categoria === cat).length;
            const el = document.getElementById('count-' + cat);
            if (el) el.textContent = n;
        });
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        
        let visible = MODELS.filter(m => {
            const matchesCategory = (activeFilter === 'all' || m.categoria === activeFilter);
            const matchesSearch = !searchQuery || (m.nombre + ' ' + (m.descripcion || '')).toLowerCase().includes(searchQuery.toLowerCase());
            return matchesCategory && matchesSearch;
        });

        if (currentSort === 'az') {
            visible.sort((a, b) => a.nombre.localeCompare(b.nombre));
        } else if (currentSort === 'za') {
            visible.sort((a, b) => b.nombre.localeCompare(a.nombre));
        } else if (currentSort === 'tipo') {
            visible.sort((a, b) => (a.categoria || '').localeCompare(b.categoria || ''));
        } else if (currentSort === 'coleccion') {
            visible.sort((a, b) => (a.coleccion || 'Otros').localeCompare(b.coleccion || 'Otros') || a.nombre.localeCompare(b.nombre));
        }

        document.getElementById('grid-label').textContent = visible.length + ' item' + (visible.length !== 1 ? 's' : '');
        grid.innerHTML = '';
        
        if (visible.length === 0) {
            grid.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 2rem; grid-column: 1/-1;">No se encontraron elementos</p>';
            return;
        }

        let lastCol = null;

        visible.forEach(m => {
            if (currentSort === 'coleccion') {
                const currentCol = m.coleccion || 'Otros';
                if (currentCol !== lastCol) {
                    const sep = document.createElement('div');
                    sep.className = 'collection-separator';
                    sep.innerHTML = `<h2>${currentCol}</h2><hr>`;
                    grid.appendChild(sep);
                    lastCol = currentCol;
                }
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                if (m.categoria === 'modelo-3d') {
                    window.location.href = `viewer.html?file=models/${m.archivo}`;
                } else {
                    window.location.href = `viewer-media.html?id=${m.id}`;
                }
            };

            const badgeLabel = nombresCategoria[m.categoria] || m.categoria || '';
            const thumbContent = m.thumbnail
                ? `<img src="${m.thumbnail}" alt="${m.nombre}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'thumb-placeholder\\'><svg viewBox=\\'0 0 24 24\\' stroke=\\'currentColor\\'><path d=\\'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z\\'/></svg><span>${badgeLabel}</span></div>';">`
                : `<div class="thumb-placeholder"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span>${badgeLabel}</span></div>`;

            card.innerHTML = `
                <div class="card-thumb">${thumbContent}</div>
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between; align-items:start; gap: 0.5rem;">
                        <div class="card-title">${m.nombre}</div>
                        <span class="badge badge-default">${badgeLabel}</span>
                    </div>
                    <div class="card-desc">${m.descripcion || 'Sin descripción'}</div>
                </div>
                <div class="card-footer">
                    <span style="font-size:0.65rem; color:#4b5563">${m.tamano || ''}</span>
                    <button class="btn-view">Abrir</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('filters').onclick = (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        renderGrid();
    };

    document.getElementById('search').addEventListener('input', (e) => {
        searchQuery = e.target.value.trim();
        renderGrid();
    });

    document.getElementById('sort-order').addEventListener('change', (e) => {
        currentSort = e.target.value;
        renderGrid();
    });
</script>

</body>
</html>
