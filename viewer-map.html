<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArchVista - Visor Cartográfico</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #050608; 
            color: #e5e7eb; 
            font-family: system-ui, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            touch-action: none; 
        }
        
        header { 
            height: 52px; 
            padding: 0 0.8rem; 
            background: #0d1117; 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px;
            z-index: 1000;
            touch-action: none;
            user-select: none;
        }
        
        #map-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .btn-header { 
            color: #9ca3af; 
            text-decoration: none; 
            font-size: 0.8rem; 
            border: 1px solid rgba(255,255,255,0.15); 
            padding: 5px 10px; 
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-header:hover { color: #fff; background: rgba(255,255,255,0.05); border-color: #00f2ff; }

        @media (max-width: 480px) {
            .btn-back-text, .btn-osm-text { display: none; }
            .btn-osm-short { display: inline !important; }
            header { padding: 0 0.5rem; }
        }

        @media (min-width: 481px) {
            .btn-osm-short { display: none; }
        }

        #map { flex: 1; background: #050608; position: relative; touch-action: auto; }
        
        .collection-nav-container { 
            position: fixed; 
            top: 50%; 
            right: 0; 
            transform: translateY(-50%);
            z-index: 1100;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: none;
        }

        @media (pointer: fine) {
            .collection-nav-container { right: 14px; }
        }
        
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.9);
            color: #00f2ff;
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-right: none;
            padding: 18px 7px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            box-shadow: -5px 0 15px rgba(0,0,0,0.4);
            user-select: none;
        }

        .coll-panel {
            background: #0d1117;
            width: 0; height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .collection-nav-container.open .coll-panel {
            width: 260px;
            height: 60vh;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-right: none;
            border-radius: 10px 0 0 10px;
            box-shadow: -20px 0 40px rgba(0,0,0,0.8);
            overflow-y: auto;
        }

        .coll-item {
            display: block;
            padding: 0.8rem 1rem;
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .coll-item:hover { background: rgba(0, 242, 255, 0.1); color: #fff; }
        .coll-item.active { color: #00f2ff; background: rgba(0, 242, 255, 0.05); border-right: 3px solid #00f2ff; }

        .compass-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .compass-arrow {
            width: 0; height: 0; 
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 18px solid #ff4d4d;
            transition: transform 0.1s linear;
        }
        .compass-label { font-size: 9px; font-weight: bold; color: #fff; }

        .leaflet-control-scale { margin-bottom: 25px !important; margin-left: 15px !important; }
        .leaflet-control-scale-line { 
            background: rgba(13, 17, 23, 0.8) !important; 
            color: #00f2ff !important; 
            border: 1px solid #00f2ff !important; 
            border-top: none !important;
            font-size: 11px !important;
            text-shadow: none !important;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-header">
            <span>←</span><span class="btn-back-text">&nbsp;Volver</span>
        </a>
        <div id="map-title">Cargando...</div>
        <a id="btn-osm" href="#" target="_blank" class="btn-header" style="display: none;">
            <span>⇗</span>&nbsp;<span class="btn-osm-text">OpenStreetMap</span><span class="btn-osm-short" style="display:none">OSM</span>
        </a>
    </header>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div id="collItemList"></div>
        </div>
    </div>

    <div id="map">
        <div class="compass-container">
            <div id="compass-needle" class="compass-arrow"></div>
            <div class="compass-label">N</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>

    <script>
        document.addEventListener('touchstart', e => {
            if (e.touches.length > 1 && !e.target.closest('#map')) e.preventDefault();
        }, { passive: false });

        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        async function initMap() {
            const res = await fetch('content.json');
            const data = await res.json();
            const item = data.find(m => m.id === itemId);
            if (!item) return;

            document.getElementById('map-title').textContent = item.nombre;
            setupCollectionSideNav(data, item);

            // Capas base con optimización de carga
            const layerConfig = { attribution: '&copy; CARTO', updateWhenZooming: false, updateWhenIdle: true };
            const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', layerConfig);
            const light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', layerConfig);
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', layerConfig);

            const map = L.map('map', {
                center: [item.lat || -33.04, item.lon || -71.61],
                zoom: item.zoom || 13,
                layers: [dark],
                rotate: true,
                touchRotate: true,
                // MEJORA: Configuraciones para eliminar el delay de geometría
                zoomAnimation: true,
                zoomAnimationThreshold: 4,
                fadeAnimation: true,
                markerZoomAnimation: true,
                renderer: L.canvas({ padding: 0.5 }) // Padding extra ayuda a suavizar bordes al mover
            });

            L.control.layers({ "Oscuro": dark, "Claro": light, "Color": osm }, null, { position: 'topleft' }).addTo(map);
            L.control.scale({ metric: true, imperial: false, position: 'bottomleft' }).addTo(map);

            const needle = document.getElementById('compass-needle');
            map.on('rotate', () => {
                needle.style.transform = `rotate(${-map.getBearing()}deg)`;
            });

            const geoStyle = { color: "#00f2ff", weight: 3, opacity: 0.8, fillColor: "#00f2ff", fillOpacity: 0.15 };
            
            if (item.archivo) {
                const path = item.archivo.startsWith('data/') ? item.archivo : `data/${item.archivo}`;
                fetch(path).then(r => r.json()).then(geoData => {
                    const layer = L.geoJSON(geoData, { 
                        style: geoStyle,
                        // Forzamos que esta capa use el renderer global optimizado
                        renderer: map.options.renderer 
                    }).addTo(map);
                    
                    map.fitBounds(layer.getBounds(), { padding: [20, 20] });
                    const center = layer.getBounds().getCenter();
                    const osmBtn = document.getElementById('btn-osm');
                    osmBtn.href = `https://www.openstreetmap.org/?mlat=${center.lat}&mlon=${center.lng}#map=17/${center.lat}/${center.lng}`;
                    osmBtn.style.display = 'flex';
                });
            }
        }

        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion;
            if (!collName) return;
            const siblings = allData.filter(i => i.coleccion === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';
            const itemList = document.getElementById('collItemList');
            itemList.innerHTML = siblings.map(i => {
                let url = i.categoria === 'modelo-3d' ? `viewer.html?file=models/${i.archivo}` : 
                          (i.categoria === 'mapa' ? `viewer-map.html?id=${i.id}` : `viewer-media.html?id=${i.id}`);
                return `<a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">${i.nombre}</a>`;
            }).join('');

            document.getElementById('collTab').onclick = (e) => {
                e.stopPropagation();
                container.classList.toggle('open');
            };
            document.addEventListener('pointerdown', e => {
                if (!container.contains(e.target)) container.classList.remove('open');
            });
        }

        initMap();
    </script>
</body>
</html>
