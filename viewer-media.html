<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArchVista - Visor Multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050608; --panel: #0d1117; --header-h: 52px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mantiene el marco fijo */
        }

        /* ── UI FIJA (Bloqueada) ── */
        header {
            height: var(--header-h);
            min-height: var(--header-h);
            padding: 0 1rem;
            background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            position: relative;
            touch-action: none; /* No permite arrastrar el header */
        }

        .nav-group { display: flex; align-items: center; gap: 0.8rem; }
        .btn-action {
            color: #9ca3af;
            text-decoration: none;
            font-size: 11px;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            white-space: nowrap;
            text-transform: uppercase;
            font-weight: 600;
        }
        .btn-action:hover { color: var(--accent); border-color: var(--accent); }

        h1 { font-size: 14px; font-weight: 500; color: #fff; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── VISOR (Navegable) ── */
        #main-viewer { 
            flex: 1;
            width: 100%;
            position: relative;
            overflow: auto; /* Permite scroll horizontal y vertical */
            background: var(--bg);
            -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
            touch-action: auto; /* Permite gestos nativos dentro del visor */
        }
        
        #content-wrapper { 
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── PDF ── */
        #pdf-render-container { 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transform-origin: top center;
        }
        .pdf-page { box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: block; }

        /* ── IFRAME (Sitios Externos) ── */
        .iframe-container {
            width: 100%;
            height: calc(100vh - var(--header-h));
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* ── VIDEO & METADATA ── */
        .video-container { width: 100%; max-width: 1000px; padding: 1rem; }
        video { width: 100%; background: #000; border-radius: 8px; }
        .metadata-card {
            margin: 1.5rem 0; background: var(--panel);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 1.2rem;
        }

        /* ── SOLAPA COLECCIÓN (Fija) ── */
        .collection-nav-container { 
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            z-index: 1100; display: flex; align-items: center;
            touch-action: none;
        }
        
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.95); color: var(--accent);
            border: 1px solid rgba(0, 242, 255, 0.4); border-right: none;
            padding: 20px 8px; border-radius: 10px 0 0 10px;
            cursor: pointer; writing-mode: vertical-rl;
            text-transform: uppercase; font-size: 0.6rem; font-weight: 800;
        }

        .coll-panel {
            background: var(--panel); width: 0; height: 0;
            overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }

        .collection-nav-container.open .coll-panel {
            width: 280px; height: 70vh;
            border: 1px solid rgba(0, 242, 255, 0.3); border-right: none;
            border-radius: 10px 0 0 10px;
        }

        .coll-item {
            display: block; padding: 1rem; color: #9ca3af;
            text-decoration: none; font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .coll-item.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--accent); }

        #zoom-controls { position: fixed; bottom: 30px; left: 20px; display: none; flex-direction: column; gap: 12px; z-index: 1500; }
        .zoom-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(13, 17, 23, 0.9); border: 1px solid var(--accent); color: var(--accent); font-size: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }

        @media (max-width: 600px) {
            h1 { max-width: 130px; }
            .collection-nav-container.open .coll-panel { width: 240px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="index.html" class="btn-action">← Volver</a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div style="padding:1rem; border-bottom:1px solid rgba(255,255,255,0.1);"><h2 id="collNameLabel" style="font-size:0.65rem; color:var(--accent); text-transform:uppercase;">Navegar</h2></div>
            <div id="collItemList" style="overflow-y:auto;"></div>
        </div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <button class="zoom-btn" id="zoomOutBtn">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null, pdfScale = 1.0, isRendering = false;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        // GESTIÓN DE PINCH-TO-ZOOM MANUAL PARA PDF
        let initialDist = 0;
        viewer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && currentPdf) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (initialDist > 0) {
                    if (dist > initialDist + 40) { changeZoom(0.1); initialDist = dist; }
                    else if (dist < initialDist - 40) { changeZoom(-0.1); initialDist = dist; }
                } else { initialDist = dist; }
            }
        }, { passive: true });
        viewer.addEventListener('touchend', () => { initialDist = 0; });

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                const items = await response.json();
                const item = items.find(i => i.id === itemId);
                if (!item) throw new Error('Archivo no encontrado');

                document.getElementById('item-title').textContent = item.nombre;
                setupCollectionSideNav(items, item);

                const wrapper = document.getElementById('content-wrapper');
                const toolbar = document.getElementById('toolbar-actions');
                const ext = item.archivo.split('.').pop().toLowerCase();

                toolbar.innerHTML = `<a href="${item.archivo}" download class="btn-action">Descargar</a>`;

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.archivo);
                } 
                else if (item.categoria === 'video') {
                    wrapper.innerHTML = `<div class="video-container"><video controls playsinline autoplay src="${item.archivo}"></video><div class="metadata-card"><h2>Descripción</h2><p>${item.descripcion || 'Sin descripción.'}</p></div></div>`;
                } 
                else if (item.categoria === 'enlace') {
                    toolbar.innerHTML = `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">Pestaña ↗</button>`;
                    wrapper.innerHTML = `<div class="iframe-container"><iframe src="${item.archivo}" allowfullscreen></iframe></div>`;
                } 
                else if (['jpg','png','webp','jpeg'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.archivo}" style="max-width:100%; margin:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">`;
                }
            } catch (err) { wrapper.innerHTML = `<p style="padding:2rem;">Error: ${err.message}</p>`; }
        }

        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            const firstPage = await currentPdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            pdfScale = (viewer.clientWidth - 40) / viewport.width;
            if (pdfScale > 1.2) pdfScale = 1.2;
            renderAllPages();
        }

        async function renderAllPages() {
            if (isRendering || !currentPdf) return;
            isRendering = true;
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 
            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                const context = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * dpr);
                canvas.height = Math.floor(viewport.height * dpr);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";
                context.scale(dpr, dpr);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
            isRendering = false;
        }

        function changeZoom(delta) {
            const newScale = pdfScale + delta;
            if (newScale >= 0.3 && newScale <= 3.0) {
                pdfScale = newScale;
                renderAllPages();
            }
        }

        document.getElementById('zoomInBtn').onclick = () => changeZoom(0.2);
        document.getElementById('zoomOutBtn').onclick = () => changeZoom(-0.2);

        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion;
            if (!collName) return;
            const siblings = allData.filter(i => i.coleccion === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';
            document.getElementById('collNameLabel').textContent = collName;
            const itemList = document.getElementById('collItemList');
            
            itemList.innerHTML = siblings.map(i => {
                let url = i.categoria === 'modelo-3d' ? `viewer.html?file=models/${i.archivo}` : 
                          (i.categoria === 'mapa' ? `viewer-map.html?id=${i.id}` : `viewer-media.html?id=${i.id}`);
                return `<a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">${i.nombre}</a>`;
            }).join('');

            document.getElementById('collTab').onclick = (e) => {
                e.stopPropagation();
                container.classList.toggle('open');
            };
            document.addEventListener('pointerdown', e => {
                if (!container.contains(e.target)) container.classList.remove('open');
            });
        }

        loadContent();
    </script>
</body>
</html>
