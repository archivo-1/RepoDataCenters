<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio - Visor multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #050608;
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 52px;
            padding: 0 1.2rem;
            background: #0d1117;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            user-select: none;
        }

        .nav-group { display: flex; align-items: center; gap: 0.8rem; }
        .btn-action {
            color: #93c5fd;
            text-decoration: none;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
            padding: 0.4rem 0.7rem;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            text-transform: uppercase;
        }

        h1 { font-size: 0.85rem; font-weight: 500; color: #9ca3af; }

        /* ── Visor con soporte para Arrastre (Panning) ── */
        #main-viewer {
            flex: 1;
            width: 100%;
            background: #050608;
            overflow: auto;
            position: relative;
            cursor: grab; /* Mano abierta */
            display: block;
        }
        
        #main-viewer:active { cursor: grabbing; } /* Mano cerrada al arrastrar */

        #pdf-render-container {
            display: inline-grid; /* Permite que el contenedor crezca con el contenido */
            justify-items: center;
            min-width: 100%;
            padding: 2rem;
        }

        .pdf-page {
            margin-bottom: 2rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            display: block;
            pointer-events: none; /* Evita que el canvas interfiera con el arrastre */
        }

        /* ── Controles ── */
        #zoom-controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: none;
            flex-direction: column;
            gap: 0.6rem;
            z-index: 1000;
        }

        .zoom-btn {
            width: 46px; height: 46px; border-radius: 50%;
            background: #1f2937; border: 1px solid #374151;
            color: white; font-size: 1.4rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #content-wrapper { width: 100%; height: 100%; }
        iframe, video, img { width: 100%; height: 100%; object-fit: contain; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="index.html" class="btn-action">← Volver</a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(0.3)">+</button>
        <button class="zoom-btn" onclick="changeZoom(-0.3)">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null;
        let pdfScale = 1.0;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        // Variables para la función de arrastre (Pan)
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        // Implementación de la Mano (Drag to scroll)
        viewer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - viewer.offsetLeft;
            startY = e.pageY - viewer.offsetTop;
            scrollLeft = viewer.scrollLeft;
            scrollTop = viewer.scrollTop;
        });

        viewer.addEventListener('mouseleave', () => isDragging = false);
        viewer.addEventListener('mouseup', () => isDragging = false);

        viewer.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - viewer.offsetLeft;
            const y = e.pageY - viewer.offsetTop;
            const walkX = (x - startX); 
            const walkY = (y - startY);
            viewer.scrollLeft = scrollLeft - walkX;
            viewer.scrollTop = scrollTop - walkY;
        });

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                const items = await response.json();
                const item = items.find(i => i.id === itemId);

                if (!item) throw new Error('No encontrado');
                document.getElementById('item-title').textContent = item.nombre;
                
                const wrapper = document.getElementById('content-wrapper');
                const toolbar = document.getElementById('toolbar-actions');
                const ext = item.archivo.split('.').pop().toLowerCase();

                toolbar.innerHTML = item.categoria === 'enlace' 
                    ? `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">⇗ Abrir Link</button>`
                    : `<a href="${item.archivo}" download class="btn-action">⇓ Descargar</a>`;

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.archivo);
                } else if (item.categoria === 'video') {
                    wrapper.innerHTML = `<video controls autoplay src="${item.archivo}"></video>`;
                } else if (item.categoria === 'galeria' || ['jpg','png','webp'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.archivo}">`;
                } else {
                    wrapper.innerHTML = `<iframe src="${item.archivo}"></iframe>`;
                }
            } catch (err) {
                document.getElementById('content-wrapper').innerHTML = `<p style="padding:2rem;">Error: ${err.message}</p>`;
            }
        }

        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            renderAllPages();
        }

        async function renderAllPages() {
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 

            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                
                const context = canvas.getContext('2d');
                const outputScale = window.devicePixelRatio || 1;

                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";

                await page.render({
                    canvasContext: context,
                    transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null,
                    viewport: viewport
                }).promise;

                container.appendChild(canvas);
            }
        }

        function changeZoom(delta) {
            const oldScale = pdfScale;
            const newScale = pdfScale + delta;
            if (newScale >= 0.4 && newScale <= 5.0) {
                pdfScale = newScale;
                
                // Calculamos el centro actual para intentar mantener la posición tras el zoom
                const centerX = (viewer.scrollLeft + viewer.clientWidth / 2) / oldScale;
                const centerY = (viewer.scrollTop + viewer.clientHeight / 2) / oldScale;

                renderAllPages().then(() => {
                    // Reposicionamos el scroll para que el usuario no se pierda
                    viewer.scrollLeft = centerX * pdfScale - viewer.clientWidth / 2;
                    viewer.scrollTop = centerY * pdfScale - viewer.clientHeight / 2;
                });
            }
        }

        loadContent();
    </script>
</body>
</html>
