<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio - Visor multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #050608;
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 52px;
            padding: 0 1.2rem;
            background: #0d1117;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            user-select: none;
        }

        .nav-group { display: flex; align-items: center; gap: 0.8rem; }
        
        .btn-action {
            color: #93c5fd;
            text-decoration: none;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
            padding: 0.4rem 0.7rem;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            text-transform: uppercase;
        }

        h1 { font-size: 0.85rem; font-weight: 500; color: #9ca3af; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── GUI: SOLAPA EXPANDIBLE (MEJORADA) ── */
        .collection-nav-container { 
            position: fixed; 
            top: 50%; 
            right: 0; /* Por defecto pegado al borde (móvil) */
            transform: translateY(-50%);
            z-index: 900; 
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ajuste para PC: Alejar la solapa de la barra de desplazamiento */
        @media (pointer: fine) {
            .collection-nav-container {
                right: 14px; /* Margen para no tapar el scrollbar de Windows */
            }
        }
        
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.9);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-right: none;
            padding: 18px 7px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            box-shadow: -5px 0 15px rgba(0,0,0,0.4);
            user-select: none;
            z-index: 2;
        }

        .coll-panel {
            background: #0d1117;
            width: 0;
            height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        /* Estado Abierto */
        .collection-nav-container.open .coll-panel {
            width: 280px;
            height: 65vh;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-right: none;
            border-radius: 10px 0 0 10px;
            box-shadow: -20px 0 40px rgba(0,0,0,0.8);
        }

        /* Animación suave de la solapa al abrir */
        .collection-nav-container.open .coll-side-tab {
            border-radius: 0 10px 10px 0; /* Se invierte el redondeo para unirse al panel */
            border-left: none;
            border-right: 1px solid rgba(59, 130, 246, 0.4);
            order: 2; /* Pasa al lado derecho del panel */
        }

        .coll-panel-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
        .coll-panel-header h2 { font-size: 0.65rem; text-transform: uppercase; color: #3b82f6; letter-spacing: 0.1em; }

        .coll-item {
            display: block;
            padding: 0.9rem 1.2rem;
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .coll-item:hover { background: rgba(59, 130, 246, 0.1); color: #fff; padding-left: 1.5rem; }
        .coll-item.active { color: #3b82f6; background: rgba(59, 130, 246, 0.05); font-weight: 600; border-right: 3px solid #3b82f6; }

        /* ── Visor y Zoom ── */
        #main-viewer { flex: 1; width: 100%; background: #050608; overflow: auto; position: relative; cursor: grab; }
        #main-viewer:active { cursor: grabbing; }
        #pdf-render-container { display: inline-grid; justify-items: center; min-width: 100%; padding: 2rem; }
        .pdf-page { margin-bottom: 2rem; box-shadow: 0 0 40px rgba(0,0,0,0.6); display: block; }

        #zoom-controls { position: fixed; bottom: 2rem; left: 2rem; display: none; flex-direction: column; gap: 0.6rem; z-index: 800; }
        .zoom-btn { width: 44px; height: 44px; border-radius: 50%; background: #1f2937; border: 1px solid #374151; color: white; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        #content-wrapper { width: 100%; height: 100%; }
        iframe, video, img { width: 100%; height: 100%; object-fit: contain; border: none; }

        @media (max-width: 600px) {
            h1 { font-size: 0.7rem; max-width: 150px; }
            .collection-nav-container.open .coll-panel { width: 240px; }
            .collection-nav-container { right: 0 !important; } /* Siempre pegado en móvil */
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="index.html" class="btn-action">← Volver</a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div class="coll-panel-header">
                <h2 id="collNameLabel">Navegar</h2>
            </div>
            <div id="collItemList"></div>
        </div>
    </div>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(0.2)">+</button>
        <button class="zoom-btn" onclick="changeZoom(-0.2)">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null;
        let pdfScale = 1.0;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        let isDragging = false, startX, startY, scrollLeft, scrollTop;
        viewer.addEventListener('mousedown', (e) => { isDragging = true; startX = e.pageX - viewer.offsetLeft; startY = e.pageY - viewer.offsetTop; scrollLeft = viewer.scrollLeft; scrollTop = viewer.scrollTop; });
        viewer.addEventListener('mouseleave', () => isDragging = false);
        viewer.addEventListener('mouseup', () => isDragging = false);
        viewer.addEventListener('mousemove', (e) => { if (!isDragging) return; e.preventDefault(); const x = e.pageX - viewer.offsetLeft; const y = e.pageY - viewer.offsetTop; viewer.scrollLeft = scrollLeft - (x - startX); viewer.scrollTop = scrollTop - (y - startY); });

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                const items = await response.json();
                const item = items.find(i => i.id === itemId);

                if (!item) throw new Error('No encontrado');
                document.getElementById('item-title').textContent = item.nombre;
                
                setupCollectionSideNav(items, item);

                const wrapper = document.getElementById('content-wrapper');
                const toolbar = document.getElementById('toolbar-actions');
                const ext = item.archivo.split('.').pop().toLowerCase();

                toolbar.innerHTML = item.categoria === 'enlace' 
                    ? `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">⇗ Abrir Link</button>`
                    : `<a href="${item.archivo}" download class="btn-action">⇓ Descargar</a>`;

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.archivo);
                } else if (item.categoria === 'video') {
                    wrapper.innerHTML = `<video controls autoplay src="${item.archivo}"></video>`;
                } else if (item.categoria === 'galeria' || ['jpg','png','webp'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.archivo}">`;
                } else {
                    wrapper.innerHTML = `<iframe src="${item.archivo}"></iframe>`;
                }
            } catch (err) {
                document.getElementById('content-wrapper').innerHTML = `<p style="padding:2rem;">Error: ${err.message}</p>`;
            }
        }

        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion;
            if (!collName) return;

            const siblings = allData.filter(i => i.coleccion === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';
            document.getElementById('collNameLabel').textContent = collName;

            const itemList = document.getElementById('collItemList');
            itemList.innerHTML = siblings.map(i => {
                let url = "";
                if (i.categoria === 'modelo-3d') url = `viewer.html?file=models/${i.archivo}`;
                else if (i.categoria === 'mapa') url = `viewer-map.html?id=${i.id}`;
                else url = `viewer-media.html?id=${i.id}`;
                return `<a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">${i.nombre}</a>`;
            }).join('');

            const tab = document.getElementById('collTab');

            // Toggle Abrir/Cerrar
            tab.addEventListener('click', (e) => {
                e.stopPropagation();
                container.classList.toggle('open');
            });

            // CORRECCIÓN TOUCH: Cerrar al tocar fuera (funciona en móvil y PC)
            // Usamos pointerdown para respuesta inmediata
            document.addEventListener('pointerdown', (e) => {
                if (!container.contains(e.target) && container.classList.contains('open')) {
                    container.classList.remove('open');
                }
            });
        }

        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            renderAllPages();
        }

        async function renderAllPages() {
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 
            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                const context = canvas.getContext('2d');
                const outputScale = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";
                await page.render({ canvasContext: context, transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
        }

        function changeZoom(delta) {
            const oldScale = pdfScale;
            const newScale = pdfScale + delta;
            if (newScale >= 0.4 && newScale <= 5.0) {
                pdfScale = newScale;
                const centerX = (viewer.scrollLeft + viewer.clientWidth / 2) / oldScale;
                const centerY = (viewer.scrollTop + viewer.clientHeight / 2) / oldScale;
                renderAllPages().then(() => {
                    viewer.scrollLeft = centerX * pdfScale - viewer.clientWidth / 2;
                    viewer.scrollTop = centerY * pdfScale - viewer.clientHeight / 2;
                });
            }
        }

        loadContent();
    </script>
</body>
</html>
