<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArchVista - Visor Multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050608; --panel: #0d1117; --header-h: 52px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        /* ── UI CAPA FIJA ── */
        header {
            height: var(--header-h);
            min-height: var(--header-h);
            padding: 0 1rem;
            background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            position: relative;
        }

        .nav-group { display: flex; align-items: center; gap: 0.8rem; }
        .btn-action {
            color: #9ca3af;
            text-decoration: none;
            font-size: 12px;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            white-space: nowrap;
            text-transform: uppercase;
            font-weight: 600;
        }
        .btn-action:hover { color: var(--accent); border-color: var(--accent); }

        h1 { font-size: 14px; font-weight: 500; color: #fff; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── VISOR PRINCIPAL ── */
        #main-viewer { 
            flex: 1;
            width: 100%;
            position: relative;
            overflow: auto;
            background: var(--bg);
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
        }
        
        #content-wrapper { 
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── PDF: FIX DISTORSIÓN ── */
        #pdf-render-container { 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .pdf-page { 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block;
        }

        /* ── VIDEO & METADATA ── */
        .video-container { width: 100%; max-width: 1000px; padding: 1rem; }
        video { width: 100%; background: #000; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        .metadata-card {
            margin-top: 1.5rem;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1.2rem;
        }
        .metadata-card h2 { font-size: 1rem; color: var(--accent); margin-bottom: 0.5rem; }
        .metadata-card p { font-size: 0.85rem; line-height: 1.5; color: #9ca3af; }
        .metadata-tag { 
            display: inline-block; margin-top: 1rem; font-size: 11px; 
            padding: 3px 8px; background: rgba(0,242,255,0.1); 
            color: var(--accent); border-radius: 4px; border: 1px solid rgba(0,242,255,0.2);
        }

        /* ── GUI: SOLAPA RESTAURADA (Estilo Original) ── */
        .collection-nav-container { 
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            z-index: 1100; display: flex; align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.95);
            color: var(--accent);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-right: none;
            padding: 20px 8px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            user-select: none;
        }

        .coll-panel {
            background: var(--panel);
            width: 0; height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .collection-nav-container.open .coll-panel {
            width: 280px;
            height: 70vh;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-right: none;
            border-radius: 10px 0 0 10px;
            box-shadow: -20px 0 40px rgba(0,0,0,0.8);
        }

        .coll-panel-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
        .coll-panel-header h2 { font-size: 0.65rem; text-transform: uppercase; color: var(--accent); letter-spacing: 0.1em; }

        .coll-item {
            display: block; padding: 1rem; color: #9ca3af;
            text-decoration: none; font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .coll-item:hover { background: rgba(0, 242, 255, 0.1); color: #fff; padding-left: 1.5rem; }
        .coll-item.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--accent); font-weight: 600; }

        /* ── ZOOM CONTROLS ── */
        #zoom-controls { 
            position: fixed; bottom: 30px; left: 20px; 
            display: none; flex-direction: column; gap: 12px; z-index: 1500; 
        }
        .zoom-btn { 
            width: 48px; height: 48px; border-radius: 50%; 
            background: rgba(13, 17, 23, 0.9); border: 1px solid var(--accent); 
            color: var(--accent); font-size: 20px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }

        iframe { width: 100%; height: calc(100vh - var(--header-h)); border: none; }

        @media (max-width: 600px) {
            h1 { max-width: 130px; }
            .collection-nav-container.open .coll-panel { width: 240px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="index.html" class="btn-action">← Volver</a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div class="coll-panel-header">
                <h2 id="collNameLabel">Navegar</h2>
            </div>
            <div id="collItemList"></div>
        </div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <button class="zoom-btn" id="zoomOutBtn">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null;
        let pdfScale = 1.0;
        let isRendering = false;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                const items = await response.json();
                const item = items.find(i => i.id === itemId);

                if (!item) throw new Error('Archivo no encontrado');
                document.getElementById('item-title').textContent = item.nombre;
                setupCollectionSideNav(items, item);

                const wrapper = document.getElementById('content-wrapper');
                const toolbar = document.getElementById('toolbar-actions');
                const ext = item.archivo.split('.').pop().toLowerCase();

                toolbar.innerHTML = `<a href="${item.archivo}" download class="btn-action">Descargar</a>`;

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.archivo);
                } 
                else if (item.categoria === 'video') {
                    wrapper.innerHTML = `
                        <div class="video-container">
                            <video controls playsinline autoplay src="${item.archivo}"></video>
                            <div class="metadata-card">
                                <h2>Descripción del recurso</h2>
                                <p>${item.descripcion || 'Sin descripción disponible.'}</p>
                                <div class="metadata-tag">${item.tamano || '--'} | MP4 Video</div>
                            </div>
                        </div>`;
                } 
                else if (item.categoria === 'enlace') {
                    toolbar.innerHTML = `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">Abrir en pestaña ↗</button>`;
                    wrapper.innerHTML = `<iframe src="${item.archivo}" allowfullscreen></iframe>`;
                } 
                else if (['jpg','png','webp','jpeg'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.archivo}" style="max-width:100%; margin:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">`;
                }
            } catch (err) {
                document.getElementById('content-wrapper').innerHTML = `<p style="padding:2rem;">Error: ${err.message}</p>`;
            }
        }

        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            const firstPage = await currentPdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            pdfScale = (viewer.clientWidth - 60) / viewport.width;
            if (pdfScale > 1.3) pdfScale = 1.3;
            renderAllPages();
        }

        async function renderAllPages() {
            if (isRendering || !currentPdf) return;
            isRendering = true;
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 
            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                const context = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * dpr);
                canvas.height = Math.floor(viewport.height * dpr);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";
                context.scale(dpr, dpr);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
            isRendering = false;
        }

        function changeZoom(delta) {
            const newScale = pdfScale + delta;
            if (newScale >= 0.4 && newScale <= 3.0) {
                pdfScale = newScale;
                renderAllPages();
            }
        }

        document.getElementById('zoomInBtn').onclick = () => changeZoom(0.2);
        document.getElementById('zoomOutBtn').onclick = () => changeZoom(-0.2);

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion;
            if (!collName) return;
            const siblings = allData.filter(i => i.coleccion === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';
            document.getElementById('collNameLabel').textContent = collName;
            const itemList = document.getElementById('collItemList');
            
            itemList.innerHTML = siblings.map(i => {
                let url = i.categoria === 'modelo-3d' ? `viewer.html?file=models/${i.archivo}` : 
                          (i.categoria === 'mapa' ? `viewer-map.html?id=${i.id}` : `viewer-media.html?id=${i.id}`);
                return `<a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">${i.nombre}</a>`;
            }).join('');

            document.getElementById('collTab').onclick = (e) => {
                e.stopPropagation();
                container.classList.toggle('open');
            };
            document.addEventListener('pointerdown', e => {
                if (!container.contains(e.target)) container.classList.remove('open');
            });
        }

        loadContent();
    </script>
</body>
</html>
