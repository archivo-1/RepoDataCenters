<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArchVista - Visor Multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #050608;
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none; /* Previene el zoom nativo del navegador */
        }

        header {
            height: 52px;
            padding: 0 0.8rem;
            background: #0d1117;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            user-select: none;
        }

        .nav-group { display: flex; align-items: center; gap: 0.6rem; }
        
        .btn-action {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.03);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-action:hover { color: #fff; border-color: #00f2ff; background: rgba(0, 242, 255, 0.05); }

        #item-title { 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: #e5e7eb; 
            max-width: 180px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* ── SIDE NAV (Consistente con visor de mapas) ── */
        .collection-nav-container { 
            position: fixed; 
            top: 50%; 
            right: 0; 
            transform: translateY(-50%);
            z-index: 1100; 
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (pointer: fine) { .collection-nav-container { right: 14px; } }
        
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.9);
            color: #00f2ff;
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-right: none;
            padding: 18px 7px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            box-shadow: -5px 0 15px rgba(0,0,0,0.4);
            user-select: none;
        }

        .coll-panel {
            background: #0d1117;
            width: 0; height: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .collection-nav-container.open .coll-panel {
            width: 260px;
            height: 60vh;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-right: none;
            border-radius: 10px 0 0 10px;
            box-shadow: -20px 0 40px rgba(0,0,0,0.8);
            overflow-y: auto;
        }

        .coll-item {
            display: block;
            padding: 0.8rem 1rem;
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .coll-item:hover { background: rgba(0, 242, 255, 0.1); color: #fff; }
        .coll-item.active { color: #00f2ff; background: rgba(0, 242, 255, 0.05); border-right: 3px solid #00f2ff; }

        /* ── VISOR ── */
        #main-viewer { 
            flex: 1; 
            width: 100%; 
            background: #050608; 
            overflow: auto; 
            position: relative; 
            -webkit-overflow-scrolling: touch; /* Momentum scroll en iOS */
            touch-action: pan-x pan-y; /* Permite scroll pero no zoom nativo */
        }
        
        #pdf-render-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 1rem;
            min-width: min-content;
        }

        .pdf-page { 
            margin-bottom: 1.5rem; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            max-width: 100%;
            height: auto !important;
        }

        /* ── CONTROLES ZOOM ── */
        #zoom-controls { 
            position: fixed; 
            bottom: 1.5rem; 
            left: 1.5rem; 
            display: none; 
            flex-direction: column; 
            gap: 0.8rem; 
            z-index: 1000; 
        }
        .zoom-btn { 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            background: rgba(31, 41, 55, 0.9); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            color: #00f2ff; 
            font-size: 1.5rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            backdrop-filter: blur(4px);
        }

        #content-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; }
        video, img { max-width: 100%; max-height: 100%; object-fit: contain; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 480px) {
            #item-title { max-width: 120px; font-size: 0.75rem; }
            .btn-text { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="index.html" class="btn-action">← <span class="btn-text">Volver</span></a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div id="collItemList"></div>
        </div>
    </div>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(0.25)">+</button>
        <button class="zoom-btn" onclick="changeZoom(-0.25)">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null;
        let pdfScale = 1.0;
        let isRendering = false;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        // ── LÓGICA DE GESTOS (TOUCH & PINCH ZOOM) ──
        let initialDist = -1;
        
        viewer.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        }, { passive: true });

        viewer.addEventListener('touchmove', e => {
            if (e.touches.length === 2 && initialDist > 0) {
                e.preventDefault();
                const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const diff = currentDist / initialDist;
                
                if (Math.abs(diff - 1) > 0.2) { // Umbral para evitar micro-ajustes
                    if (diff > 1) changeZoom(0.1);
                    else changeZoom(-0.1);
                    initialDist = currentDist;
                }
            }
        }, { passive: false });

        // Drag con mouse para PC
        let isDragging = false, startX, startY, scrollLeft, scrollTop;
        viewer.addEventListener('mousedown', (e) => { 
            if (e.button !== 0) return;
            isDragging = true; 
            viewer.style.cursor = 'grabbing';
            startX = e.pageX - viewer.offsetLeft; 
            startY = e.pageY - viewer.offsetTop; 
            scrollLeft = viewer.scrollLeft; 
            scrollTop = viewer.scrollTop; 
        });
        window.addEventListener('mouseup', () => { isDragging = false; viewer.style.cursor = 'grab'; });
        viewer.addEventListener('mousemove', (e) => { 
            if (!isDragging) return; 
            const x = e.pageX - viewer.offsetLeft; 
            const y = e.pageY - viewer.offsetTop; 
            viewer.scrollLeft = scrollLeft - (x - startX); 
            viewer.scrollTop = scrollTop - (y - startY); 
        });

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                const items = await response.json();
                const item = items.find(i => i.id === itemId);

                if (!item) throw new Error('Archivo no encontrado');
                document.getElementById('item-title').textContent = item.nombre;
                
                setupCollectionSideNav(items, item);

                const wrapper = document.getElementById('content-wrapper');
                const toolbar = document.getElementById('toolbar-actions');
                const ext = item.archivo.split('.').pop().toLowerCase();

                toolbar.innerHTML = item.categoria === 'enlace' 
                    ? `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">⇗ Abrir</button>`
                    : `<a href="${item.archivo}" download class="btn-action">⇓ Descargar</a>`;

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.archivo);
                } else if (item.categoria === 'video') {
                    wrapper.innerHTML = `<video controls autoplay src="${item.archivo}"></video>`;
                } else if (item.categoria === 'galeria' || ['jpg','png','webp'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.archivo}" style="cursor:zoom-in" onclick="window.open(this.src)">`;
                } else {
                    wrapper.innerHTML = `<iframe src="${item.archivo}"></iframe>`;
                }
            } catch (err) {
                document.getElementById('content-wrapper').innerHTML = `<p style="padding:2rem; color:#ff4d4d;">${err.message}</p>`;
            }
        }

        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion;
            if (!collName) return;
            const siblings = allData.filter(i => i.coleccion === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';

            const itemList = document.getElementById('collItemList');
            itemList.innerHTML = siblings.map(i => {
                let url = i.categoria === 'modelo-3d' ? `viewer.html?file=models/${i.archivo}` : 
                          (i.categoria === 'mapa' ? `viewer-map.html?id=${i.id}` : `viewer-media.html?id=${i.id}`);
                return `<a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">${i.nombre}</a>`;
            }).join('');

            document.getElementById('collTab').onclick = (e) => {
                e.stopPropagation();
                container.classList.toggle('open');
            };
            document.addEventListener('pointerdown', e => {
                if (!container.contains(e.target)) container.classList.remove('open');
            });
        }

        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            // Ajuste inicial según ancho de pantalla
            const firstPage = await currentPdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            pdfScale = (viewer.clientWidth - 40) / viewport.width;
            if (pdfScale > 1.5) pdfScale = 1.2;
            renderAllPages();
        }

        async function renderAllPages() {
            if (isRendering) return;
            isRendering = true;
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 
            
            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                const context = canvas.getContext('2d');
                
                const dpr = window.devicePixelRatio || 1;
                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                canvas.style.width = viewport.width + "px";
                canvas.style.height = viewport.height + "px";
                
                context.scale(dpr, dpr);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
            isRendering = false;
        }

        // Función de debounce simple para no saturar el renderizado al hacer zoom rápido
        let zoomTimeout;
        function changeZoom(delta) {
            const newScale = pdfScale + delta;
            if (newScale >= 0.25 && newScale <= 4.0) {
                pdfScale = newScale;
                clearTimeout(zoomTimeout);
                zoomTimeout = setTimeout(renderAllPages, 150);
            }
        }

        loadContent();
    </script>
</body>
</html>
