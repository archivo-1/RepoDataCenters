<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArchVista - Visor Multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050608; --panel: #0d1117; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Permitimos pan (scroll) pero no zoom nativo del sistema */
            touch-action: pan-x pan-y; 
        }

        /* ── HEADER FIXED ── */
        header {
            height: 52px;
            padding: 0 1rem;
            background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            user-select: none;
        }

        .nav-group { display: flex; align-items: center; gap: 0.8rem; }
        
        .btn-action {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-action:hover { color: var(--accent); border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        h1 { font-size: 0.85rem; font-weight: 500; color: #fff; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── NAVEGACIÓN LATERAL (COLECCIÓN) ── */
        .collection-nav-container { 
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            z-index: 1100; display: flex; align-items: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (pointer: fine) { .collection-nav-container { right: 12px; } }
        
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.95);
            color: var(--accent);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-right: none;
            padding: 20px 8px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        .coll-panel {
            background: var(--panel);
            width: 0; height: 0; overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .collection-nav-container.open .coll-panel {
            width: 260px; height: 65vh;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-right: none;
            border-radius: 10px 0 0 10px;
            box-shadow: -20px 0 40px rgba(0,0,0,0.8);
            overflow-y: auto;
        }

        .coll-item {
            display: block; padding: 1rem; color: #9ca3af;
            text-decoration: none; font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .coll-item.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--accent); }

        /* ── VISOR PRINCIPAL ── */
        #main-viewer { 
            flex: 1; width: 100%; position: relative; 
            overflow: auto; background: var(--bg);
            -webkit-overflow-scrolling: touch;
        }
        
        #content-wrapper { 
            width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: flex-start;
        }

        /* Ajustes específicos por tipo */
        #pdf-render-container { padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; }
        .pdf-page { margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 100%; }

        video { 
            width: 100%; max-height: 100%; outline: none; 
            touch-action: auto; /* IMPORTANTE: Permite interactuar con controles nativos */
        }
        
        iframe { width: 100%; height: 100%; border: none; background: #fff; touch-action: auto; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* ── CONTROLES ZOOM (Solo PDF) ── */
        #zoom-controls { 
            position: fixed; bottom: 2rem; left: 1.5rem; 
            display: none; flex-direction: column; gap: 0.8rem; z-index: 1000; 
        }
        .zoom-btn { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: rgba(13, 17, 23, 0.9); border: 1px solid var(--accent); 
            color: var(--accent); font-size: 1.5rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }

        @media (max-width: 600px) {
            h1 { max-width: 140px; font-size: 0.75rem; }
            #pdf-render-container { padding: 1rem 0.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="index.html" class="btn-action">← Volver</a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div id="collItemList"></div>
        </div>
    </div>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <button class="zoom-btn" id="zoomOutBtn">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null;
        let pdfScale = 1.2;
        let isRendering = false;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');

        // ── GESTIÓN DE ZOOM TÁCTIL (PINCH) ──
        let initialDist = 0;
        viewer.addEventListener('touchstart', e => {
            if (e.touches.length === 2 && currentPdf) {
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        }, { passive: true });

        viewer.addEventListener('touchmove', e => {
            if (e.touches.length === 2 && currentPdf && initialDist > 0) {
                const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const diff = currentDist / initialDist;
                
                if (Math.abs(diff - 1) > 0.15) { // Sensibilidad
                    changeZoom(diff > 1 ? 0.2 : -0.2);
                    initialDist = currentDist;
                }
            }
        }, { passive: true });

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                const items = await response.json();
                const item = items.find(i => i.id === itemId);

                if (!item) throw new Error('Archivo no encontrado');
                document.getElementById('item-title').textContent = item.nombre;
                
                setupCollectionSideNav(items, item);

                const wrapper = document.getElementById('content-wrapper');
                const toolbar = document.getElementById('toolbar-actions');
                const ext = item.archivo.split('.').pop().toLowerCase();

                toolbar.innerHTML = `<a href="${item.archivo}" download class="btn-action">Descargar</a>`;

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.archivo);
                } else if (item.categoria === 'video') {
                    //playsinline y controls para asegurar visibilidad en móviles
                    wrapper.innerHTML = `<video controls playsinline autoplay src="${item.archivo}"></video>`;
                } else if (item.categoria === 'enlace') {
                    toolbar.innerHTML = `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">Abrir en pestaña ↗</button>`;
                    wrapper.innerHTML = `<iframe src="${item.archivo}" allowfullscreen></iframe>`;
                } else if (['jpg','png','webp'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.archivo}">`;
                } else {
                    wrapper.innerHTML = `<iframe src="${item.archivo}"></iframe>`;
                }
            } catch (err) {
                document.getElementById('content-wrapper').innerHTML = `<p style="padding:2rem;">${err.message}</p>`;
            }
        }

        // ── LÓGICA PDF ──
        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            
            // Ajuste de escala inicial según dispositivo
            const firstPage = await currentPdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            const containerWidth = viewer.clientWidth - 40;
            pdfScale = containerWidth / viewport.width;
            if (pdfScale > 1.4) pdfScale = 1.4; // No exceder en desktop

            renderAllPages();
        }

        async function renderAllPages() {
            if (isRendering) return;
            isRendering = true;
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 
            
            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                const context = canvas.getContext('2d');
                
                const dpr = window.devicePixelRatio || 1;
                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                canvas.style.width = viewport.width + "px";
                canvas.style.height = viewport.height + "px";
                
                context.scale(dpr, dpr);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
            isRendering = false;
        }

        let zoomTimeout;
        function changeZoom(delta) {
            const newScale = pdfScale + delta;
            if (newScale >= 0.3 && newScale <= 4.0) {
                pdfScale = newScale;
                clearTimeout(zoomTimeout);
                zoomTimeout = setTimeout(renderAllPages, 100);
            }
        }

        document.getElementById('zoomInBtn').onclick = () => changeZoom(0.3);
        document.getElementById('zoomOutBtn').onclick = () => changeZoom(-0.3);

        // ── SIDE NAV ──
        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion;
            if (!collName) return;
            const siblings = allData.filter(i => i.coleccion === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';

            const itemList = document.getElementById('collItemList');
            itemList.innerHTML = siblings.map(i => {
                let url = i.categoria === 'modelo-3d' ? `viewer.html?file=models/${i.archivo}` : 
                          (i.categoria === 'mapa' ? `viewer-map.html?id=${i.id}` : `viewer-media.html?id=${i.id}`);
                return `<a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">${i.nombre}</a>`;
            }).join('');

            document.getElementById('collTab').onclick = (e) => {
                e.stopPropagation();
                container.classList.toggle('open');
            };
            document.addEventListener('pointerdown', e => {
                if (!container.contains(e.target)) container.classList.remove('open');
            });
        }

        loadContent();
    </script>
</body>
</html>
